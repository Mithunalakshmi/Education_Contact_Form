<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLearn - Contact Us</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#4e73df;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        input, textarea{
            width:100%;
            padding:15px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        button{
            width:100%;
            padding:15px;
            background:#4e73df;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#224abe;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>EduLearn</h1>

        <p>Connect with us for educational guidance and support.</p>

        <form id="contactForm">

            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required>

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>

            <textarea
                id="message"
                rows="6"
                placeholder="Enter your message"
                required></textarea>

            <button type="submit">
                Submit
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
